<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tạo Link Shopee Affiliate</title>

<style>

body{
font-family: Arial;
background:#ffe2d2;
padding:40px;
text-align:center;
}

.box{
background:white;
padding:20px;
border-radius:12px;
max-width:420px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
color:#ff5722;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:10px;
background:#ff5722;
color:white;
border:none;
padding:12px;
width:100%;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button.copy{
background:#2196f3;
}

button.fb{
background:#1877f2;
}

.result{
margin-top:10px;
word-break:break-all;
color:#333;
}

img{
width:100%;
border-radius:10px;
margin-top:15px;
}

</style>
</head>

<body>

<div class="box">

<h2>🔗 Tạo Link Shopee</h2>

<input id="link" placeholder="Dán link Shopee vào đây">

<button onclick="createLink()">Tạo Link</button>

<div class="result" id="result"></div>

<button class="copy" onclick="copyLink()">Copy Link</button>

<a href="https://www.facebook.com/share/p/1CWm68Pd3a/?mibextid=wwXIfr" target="_blank">
<button class="fb">Đi đến bài đăng Facebook</button>
</a>

<img src="z7616504655830_d56ca01855218f1c94509e0415fcdc6a.jpg">

<div style="text-align:left;margin-top:15px;background:#f5f5f5;padding:10px;border-radius:8px">
<b>Hướng dẫn</b><br>
1. Dán link sản phẩm Shopee vào ô.<br>
2. Nhấn "Tạo Link".<br>
3. Nhấn "Copy Link".<br>
4. Dán vào bình luận Facebook.
</div>

</div>

<script>

function createLink(){

var link=document.getElementById("link").value;

if(link==""){
alert("Vui lòng dán link Shopee");
return;
}

var aff="17302230441";

var newlink=link+"?aff_id="+aff;

document.getElementById("result").innerText=newlink;

}

function copyLink(){

var text=document.getElementById("result").innerText;

navigator.clipboard.writeText(text);

alert("Đã copy link");

}

</script>

</body>
</html>
